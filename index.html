<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: viewport-fit=cover para iPhone X+ (notch/home bar) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA: Web App Manifest (Android + moderno) ──────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── PWA: iOS Safari ────────────────────────────────────────────────── -->
    <!-- Activa el modo standalone al abrir desde pantalla de inicio -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Barra de estado transparente (deja ver el fondo de la app) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Nombre de la app en iOS -->
    <meta name="apple-mobile-web-app-title" content="Bangkok" />

    <!-- Icono para iOS — varias resoluciones para cubrir todos los iPhones/iPads
         iOS elige el más cercano al tamaño que necesita.
         El archivo raíz (apple-touch-icon.png) es el fallback de descubrimiento. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Theme color: colorea la barra del navegador en Android ─────────── -->
    <meta name="theme-color" content="#111111" />

    <!-- ── Otros meta mobile ──────────────────────────────────────────────── -->
    <!-- Evita que iOS detecte teléfonos/emails y los convierta en links -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Android: nombre de la app en el banner de instalación -->
    <meta name="application-name" content="Bangkok Noodles" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Bangkok — Sistema de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
